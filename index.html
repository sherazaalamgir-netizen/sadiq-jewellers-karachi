<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadiq Jewellers | Luxury Gold & Silver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/modal-style.css">

    <style>
        .gold-text { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
        .filterDiv { display: none; }
        .show { display: block; }
        img { transition: opacity 0.3s; }
        img:hover { transform: scale(1.05); cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b-4 border-yellow-600">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold gold-text tracking-tighter uppercase">Sadiq Jewellers</h1>
                <p class="text-[10px] text-gray-500 tracking-widest uppercase">Purity is our Tradition</p>
            </div>
            <div class="flex space-x-3">
                <a href="https://wa.me/923142758002" target="_blank" class="bg-green-500 text-white p-2 rounded-full hover:bg-green-600 shadow-lg">
                    <i class="fab fa-whatsapp text-xl"></i>
                </a>
            </div>
        </div>
    </header>

    <section class="container mx-auto px-4 py-12">
        <div class="flex flex-wrap justify-center gap-3 mb-10">
            <button onclick="filterSelection('all')" class="bg-yellow-700 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-yellow-800 transition">All</button>
            <button onclick="filterSelection('rings')" class="border-2 border-yellow-700 text-yellow-800 px-6 py-2 rounded-full font-bold hover:bg-yellow-700 hover:text-white transition">Rings</button>
            <button onclick="filterSelection('necklace')" class="border-2 border-yellow-700 text-yellow-800 px-6 py-2 rounded-full font-bold hover:bg-yellow-700 hover:text-white transition">Necklace</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="filterDiv rings bg-white rounded-xl shadow-lg overflow-hidden border hover:shadow-2xl transition">
                <img src="rings/r1.png" class="clickable-img w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/300?text=Ring+r1.png+Not+Found'">
                <div class="p-4 text-center">
                    <h4 class="font-bold">Gold Ring R1</h4>
                    <p class="text-xs text-gray-500 mb-2">22K Pure Gold Design</p>
                    <a href="https://wa.me/923142758002" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold block">Order Now</a>
                </div>
            </div>

            <div class="filterDiv necklace bg-white rounded-xl shadow-lg overflow-hidden border hover:shadow-2xl transition">
                <img src="necklace/n1.png" class="clickable-img w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/300?text=Necklace+n1.png+Not+Found'">
                <div class="p-4 text-center">
                    <h4 class="font-bold">Necklace N1</h4>
                    <p class="text-xs text-gray-500 mb-2">Bridal Collection</p>
                    <a href="https://wa.me/923142758002" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold block">Order Now</a>
                </div>
            </div>
        </div>
    </section>

    <div id="imageModal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.9); padding-top:50px;">
        <span class="close" style="position:absolute; top:20px; right:35px; color:white; font-size:40px; font-weight:bold; cursor:pointer;">&times;</span>
        <img id="modalImg" style="margin:auto; display:block; max-width:90%; max-height:80%; border:4px solid white; border-radius:10px;">
    </div>

    <footer class="bg-white border-t-8 border-yellow-700 py-12 text-center mt-10">
        <p class="text-gray-400 text-sm italic">&copy; 2026 Sadiq Jewellers.</p>
    </footer>

    <script>
        // Filter Selection Function
        function filterSelection(c) {
            var x, i;
            x = document.getElementsByClassName("filterDiv");
            if (c == "all") c = "";
            for (i = 0; i < x.length; i++) {
                x[i].classList.remove("show");
                if (x[i].className.indexOf(c) > -1) x[i].classList.add("show");
            }
        }
        filterSelection("all");

        // Modal Logic
        var modal = document.getElementById("imageModal");
        var modalImg = document.getElementById("modalImg");
        var closeBtn = document.querySelector(".close");

        // Click on image to open
        document.querySelectorAll('.clickable-img').forEach(img => {
            img.onclick = function() {
                modal.style.display = "block";
                modalImg.src = this.src;
            }
        });

        // Click on (x) to close
        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        // Click outside image to close
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
