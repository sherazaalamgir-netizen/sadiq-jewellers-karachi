<link rel="stylesheet" href="assets/css/modal-style.css">

<img class="clickable-img" src="images/gold-ring.jpg" alt="Jewellery" style="width:250px; cursor:pointer;">

<div id="imageModal">
    <span class="close">&times;</span>
    <img id="modalImg">
</div>

<script>
    var modal = document.getElementById("imageModal");
    var modalImg = document.getElementById("modalImg");
    var closeBtn = document.querySelector(".close");

    // Sab images ko clickable banane ka logic
    document.querySelectorAll('.clickable-img').forEach(img => {
        img.onclick = function() {
            modal.style.display = "block";
            modalImg.src = this.src;
        }
    });

    // Band karne ka logic
    closeBtn.onclick = function() {
        modal.style.display = "none";
    }

    // Bahar click karne par band hona
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
